<!-- PayVector Direct Payment Template -->
<div class="payment-method" data-bind="css: {'_active': (getCode() == isChecked())}">
    <div class="payment-method-title field choice">
        <input type="radio" name="payment[method]" class="radio"
            data-bind="attr: {'id': getCode()}, value: getCode(), checked: isChecked, click: selectPaymentMethod, visible: isRadioButtonVisible()" />
        <label data-bind="attr: {'for': getCode()}" class="label">
            <img data-bind="attr: {src: getPaymentSrc(), alt: $t('Pay with PayVector')}" class="payment-icon"
                style="height:60px;" />
            <span data-bind="text: getTitle()"></span>
        </label>
    </div>

    <div class="payment-method-content payvector-payment-content">
        <!-- ko if: lastUsedCard -->
        <div class="field choice">
            <input type="radio" name="payvector_card_option" id="payvector_saved" value="saved"
                data-bind="checked: selectedCardOption" />
            <label for="payvector_saved">
                Use saved card:
                <strong
                    data-bind="text: lastUsedCard() ? lastUsedCard().card_type + ' ending in ' + lastUsedCard().last4 :''"></strong>
            </label>
        </div>
        <!-- ko if: !lastUsedCard() || selectedCardOption() === 'saved' -->
        <fieldset
            data-bind="attr: {class: 'fieldset payment items ' + getCode(), id: 'payment_form_' + getCode()}">
            <div class="field cvv required">
                <label data-bind="attr: {for: getCode() + '_cc_cid'}" class="label">
                    <span><!-- ko i18n: 'CV2'--><!-- /ko --></span>
                </label>

                <div class="control _with-tooltip">
                    <input type="number" autocomplete="off" class="input-text cvv" name="payment[cc_cid]" value=""
                        oncopy="return false;" oncut="return false;" onpaste="return false;" data-bind="attr: {id: getCode() + '_cc_cid',
                        title: $t('Card Verification Number'),
                        'data-container': getCode() + '-cc-cvv',
                        'data-validate': JSON.stringify({'required-number':true, 'validate-card-cvv':'#' + getCode() + '_cc_type'})},                        
                        value: creditCardVerificationNumber" />
                </div>
            </div>
        </fieldset>
        <!-- /ko -->

        <div class="field choice">
            <input type="radio" name="payvector_card_option" id="payvector_new" value="new"
                data-bind="checked: selectedCardOption" />
            <label for="payvector_new">Use a new card</label>
        </div>
        <!-- /ko -->
        <!-- Hidden 3D Secure V2 Fields -->
        <input type="hidden" name="browserUserAgent" data-bind="value: browserUserAgent" />
        <input type="hidden" name="acceptHeader" data-bind="value: acceptHeader" />
        <input type="hidden" name="language" data-bind="value: browserLanguage" />
        <input type="hidden" name="screenWidth" data-bind="value: screenWidth" />
        <input type="hidden" name="screenHeight" data-bind="value: screenHeight" />
        <input type="hidden" name="colorDepth" data-bind="value: colorDepth" />
        <input type="hidden" name="javaEnabled" data-bind="value: javaEnabled" />
        <input type="hidden" name="timeZoneOffset" data-bind="value: timeZoneOffset" />


        <!-- New Card Form -->
        <!-- ko if: !lastUsedCard() || selectedCardOption() === 'new' -->
        <!-- ko template: 'PayVector_Payment/payment/cc-form' --><!-- /ko -->
        <!-- /ko -->

        <!-- Place Order Button -->

        <div class="payment-method-billing-address">
            <!-- ko foreach: $parent.getRegion(getBillingAddressFormName()) -->
            <!-- ko template: getTemplate() --><!-- /ko -->
            <!--/ko-->
        </div>
        <div class="checkout-agreements-block">
            <!-- ko foreach: $parent.getRegion('before-place-order') -->
            <!-- ko template: getTemplate() --><!-- /ko -->
            <!--/ko-->
        </div>
        <div class="actions-toolbar">
            <div class="primary">
                <button class="action primary checkout" type="submit" data-bind="
                        click: placeOrder,
                        attr: {title: $t('Place Order')},
                        enable: isPlaceOrderActionAllowed()">
                    <span data-bind="i18n: 'Place Order'"></span>
                </button>
            </div>
        </div>
    </div>
</div>
